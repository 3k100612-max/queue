<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Entrance Kiosk</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #1a1a1a; color: white; }
        #reader { width: 100%; max-width: 600px; margin: auto; background: white; border-radius: 20px; overflow: hidden; }
    </style>
</head>
<body class="text-center">
    <div class="container py-5">
        <h1 class="display-4 mb-3">Welcome</h1>
        <p class="lead mb-5">Show your QR Code to the camera to check-in</p>
        
        <div id="reader"></div>
        
        <div id="status-msg" class="mt-5 h2"></div>
    </div>

    <script>
        function onScanSuccess(decodedText) {
            document.getElementById('status-msg').className = "mt-5 h2 text-warning";
            document.getElementById('status-msg').innerText = "Processing " + decodedText + "...";

            fetch('/api/scan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: decodedText })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    document.getElementById('status-msg').className = "mt-5 h2 text-success";
                    document.getElementById('status-msg').innerText = "✅ Welcome, " + decodedText + "!";
                    // Reset message after 4 seconds
                    setTimeout(() => { document.getElementById('status-msg').innerText = ""; }, 4000);
                }
            });
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 300 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
