<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Join Queue</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-4">
    <div class="card shadow-sm p-4 mt-5">
        <h2 class="text-center mb-4">Join the Line</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Enter Your Name</label>
                <input type="text" name="name" class="form-control form-control-lg" required placeholder="John Doe">
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Get My Ticket</button>
        </form>
    </div>
</body>
</html>
