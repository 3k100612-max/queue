<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Join the Queue</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; display: flex; align-items: center; min-vh-100; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { background: var(--primary-gradient); border: none; padding: 15px; font-weight: bold; }
        .qr-instruction { background: #fff3cd; border-left: 5px solid #ffc107; padding: 15px; border-radius: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-ticket-alt fa-3x text-primary mb-3"></i>
                    <h3>Welcome!</h3>
                    <p class="text-muted">Join the queue to get served.</p>
                </div>
                
                <div class="qr-instruction mb-4">
                    <strong><i class="fas fa-qrcode"></i> Location Check:</strong> 
                    Please ensure you are at the premises. Scan the main screen QR to join.
                </div>

                <form action="/join" method="POST">
                    <div class="form-floating mb-3">
                        <input type="text" name="name" class="form-control" id="userName" placeholder="Name" required>
                        <label for="userName">Enter Your Full Name</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 shadow">
                        GET MY TICKET <i class="fas fa-chevron-right ms-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
