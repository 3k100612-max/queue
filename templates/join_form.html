<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Queue System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .card { border: none; border-radius: 20px; }
        .btn-primary { background: var(--primary-gradient); border: none; }
        
        /* Fancy Status Styles */
        .status-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 8px solid #e9ecef;
            border-top: 8px solid #764ba2;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            animation: spin 2s linear infinite;
        }
        .queue-number { font-size: 3rem; font-weight: 800; color: #764ba2; animation: none; }
        
        .qr-instruction {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 15px;
            border-radius: 10px;
        }

        @keyframes spin { 0% { border-top-color: #764ba2; } 50% { border-top-color: #667eea; } 100% { border-top-color: #764ba2; } }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            
            <!-- Step 1: Join Form (Hidden after submission) -->
            <div id="join-card" class="card shadow-lg p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-users-ray fa-3x text-primary mb-3"></i>
                    <h3>Join the Queue</h3>
                    <p class="text-muted">Enter your name to get started</p>
                </div>
                
                <div class="qr-instruction mb-4">
                    <small><strong><i class="fas fa-qrcode"></i> Tip:</strong> Scan the QR code on the main screen to verify your location!</small>
                </div>

                <form id="queueForm">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="userName" placeholder="Your Name" required>
                        <label for="userName">Full Name</label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 py-3 shadow">
                        Get My Ticket <i class="fas fa-ticket-alt ms-2"></i>
                    </button>
                </form>
            </div>

            <!-- Step 2: Fancy Status (Shown after submission) -->
            <div id="status-card" class="card shadow-lg p-4 d-none text-center">
                <h4 id="welcomeMsg">Hello, User!</h4>
                <p class="text-muted">You are successfully in line.</p>
                
                <div class="status-circle">
                    <div class="queue-number" id="currentPos">--</div>
                </div>
                <p class="fw-bold mb-0">Your Position</p>
                
                <hr class="my-4">
                
                <div class="row">
                    <div class="col-6 border-end">
                        <small class="text-muted d-block">Estimated Wait</small>
                        <span class="h5" id="waitTime">-- mins</span>
                    </div>
                    <div class="col-6">
                        <small class="text-muted d-block">People Ahead</small>
                        <span class="h5" id="peopleAhead">--</span>
                    </div>
                </div>

                <div class="mt-4 alert alert-info py-2">
                    <small><i class="fas fa-sync fa-spin me-2"></i> Updating in real-time...</small>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const form = document.getElementById('queueForm');
    const joinCard = document.getElementById('join-card');
    const statusCard = document.getElementById('status-card');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('userName').value;
        
        // Simulate Server logic
        joinCard.classList.add('d-none');
        statusCard.classList.remove('d-none');
        document.getElementById('welcomeMsg').innerText = `Hold tight, ${name}!`;
        
        // Initialize real-time simulation
        updateQueueStatus(8); // Starting at position 8
    });

    function updateQueueStatus(pos) {
        const avgServiceTime = 5; // 5 minutes per person
        
        const updateUI = (current) => {
            document.getElementById('currentPos').innerText = current;
            document.getElementById('peopleAhead').innerText = current - 1;
            document.getElementById('waitTime').innerText = `${current * avgServiceTime} mins`;
        };

        updateUI(pos);

        // Simulation: Decrease position every 10 seconds
        let current = pos;
        const interval = setInterval(() => {
            if (current > 1) {
                current--;
                updateUI(current);
            } else {
                document.getElementById('currentPos').innerHTML = '<i class="fas fa-check"></i>';
                document.getElementById('welcomeMsg').innerText = "It's your turn!";
                clearInterval(interval);
            }
        }, 10000);
    }
</script>

</body>
</html>
